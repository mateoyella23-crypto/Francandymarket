<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - FRAN CANDY MARKET</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 10px;
        }

        .nav-buttons {
            text-align: center;
            margin-top: 15px;
        }

        .nav-buttons button {
            padding: 10px 20px;
            margin: 0 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-tienda {
            background: #3498db;
            color: white;
        }

        .btn-tienda:hover {
            background: #2980b9;
        }

        .form-section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #2c3e50;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #2ecc71;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 14px;
        }

        .btn-agregar {
            background: #2ecc71;
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .btn-agregar:hover {
            background: #27ae60;
        }

        .btn-limpiar {
            background: #95a5a6;
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .btn-limpiar:hover {
            background: #7f8c8d;
        }

        .productos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .producto {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .producto:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.2);
        }

        .producto img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f0f0f0;
        }

        .producto-info {
            padding: 15px;
        }

        .producto h3 {
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .producto-precio {
            color: #2ecc71;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .producto-desc {
            color: #7f8c8d;
            font-size: 12px;
            margin-bottom: 10px;
            min-height: 40px;
        }

        .producto-actions {
            display: flex;
            gap: 8px;
        }

        .btn-editar, .btn-borrar {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 12px;
        }

        .btn-editar {
            background: #f39c12;
            color: white;
        }

        .btn-editar:hover {
            background: #e67e22;
        }

        .btn-borrar {
            background: #e74c3c;
            color: white;
        }

        .btn-borrar:hover {
            background: #c0392b;
        }

        .vacio {
            text-align: center;
            color: #7f8c8d;
            padding: 40px;
            font-size: 16px;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            border-bottom: 2px solid #2ecc71;
            padding-bottom: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ Panel de Administración - FRAN CANDY MARKET</h1>
            <div class="nav-buttons">
                <button class="btn-tienda" onclick="irATienda()">👁️ Ver Tienda</button>
            </div>
        </header>

        <div class="form-section">
            <h2>📦 Agregar Nuevo Producto</h2>
            
            <div id="alertaMensaje" class="alert"></div>

            <div class="form-row">
                <div class="form-group">
                    <label for="nombre">Nombre del Producto *</label>
                    <input type="text" id="nombre" placeholder="Ej: Caramelos de Fresa" required>
                </div>
                <div class="form-group">
                    <label for="precio">Precio ($) *</label>
                    <input type="number" id="precio" placeholder="0.00" min="0" step="0.01" required>
                </div>
            </div>

            <div class="form-group">
                <label for="descripcion">Descripción</label>
                <textarea id="descripcion" placeholder="Describe el producto..." rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="imagen">URL de la Imagen *</label>
                <input type="url" id="imagen" placeholder="https://ejemplo.com/imagen.jpg" required>
            </div>

            <div class="button-group">
                <button class="btn-agregar" onclick="agregarProducto()">✅ Agregar Producto</button>
                <button class="btn-limpiar" onclick="limpiarFormulario()">🗑️ Limpiar</button>
            </div>
        </div>

        <div class="form-section">
            <h2>📊 Estadísticas</h2>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalProductos">0</div>
                    <div class="stat-label">Productos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="precioPromedio">$0</div>
                    <div class="stat-label">Precio Promedio</div>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h2>📋 Productos Registrados</h2>
            <div class="productos" id="productos"></div>
        </div>
    </div>

    <script>
        let productos = JSON.parse(localStorage.getItem("productos")) || [];

        function mostrarAlerta(mensaje, tipo = 'success') {
            const alerta = document.getElementById('alertaMensaje');
            alerta.textContent = mensaje;
            alerta.className = `alert alert-${tipo}`;
            setTimeout(() => {
                alerta.className = 'alert';
            }, 3000);
        }

        function validarFormulario() {
            const nombre = document.getElementById("nombre").value.trim();
            const precio = document.getElementById("precio").value.trim();
            const imagen = document.getElementById("imagen").value.trim();

            if (!nombre) {
                mostrarAlerta('Por favor ingresa el nombre del producto', 'error');
                return false;
            }
            if (!precio || isNaN(precio) || precio <= 0) {
                mostrarAlerta('Por favor ingresa un precio válido', 'error');
                return false;
            }
            if (!imagen) {
                mostrarAlerta('Por favor ingresa la URL de la imagen', 'error');
                return false;
            }
            return true;
        }

        function agregarProducto() {
            if (!validarFormulario()) return;

            const producto = {
                id: Date.now(),
                nombre: document.getElementById("nombre").value.trim(),
                precio: parseFloat(document.getElementById("precio").value),
                descripcion: document.getElementById("descripcion").value.trim(),
                imagen: document.getElementById("imagen").value.trim()
            };

            productos.push(producto);
            guardar();
            limpiarFormulario();
            mostrarAlerta('✅ Producto agregado correctamente');
        }

        function editarProducto(id) {
            const producto = productos.find(p => p.id === id);
            if (!producto) return;

            const nuevoNombre = prompt("Nombre del producto", producto.nombre);
            if (nuevoNombre === null) return;

            const nuevoPrecio = prompt("Precio", producto.precio);
            if (nuevoPrecio === null) return;

            const nuevaDescripcion = prompt("Descripción", producto.descripcion);
            if (nuevaDescripcion === null) return;

            const nuevaImagen = prompt("URL de imagen", producto.imagen);
            if (nuevaImagen === null) return;

            producto.nombre = nuevoNombre.trim();
            producto.precio = parseFloat(nuevoPrecio);
            producto.descripcion = nuevaDescripcion.trim();
            producto.imagen = nuevaImagen.trim();

            guardar();
            mostrarAlerta('✏️ Producto editado correctamente');
        }

        function borrarProducto(id) {
            if (confirm('¿Estás seguro de que quieres borrar este producto?')) {
                productos = productos.filter(p => p.id !== id);
                guardar();
                mostrarAlerta('🗑️ Producto borrado correctamente');
            }
        }

        function limpiarFormulario() {
            document.getElementById("nombre").value = "";
            document.getElementById("precio").value = "";
            document.getElementById("descripcion").value = "";
            document.getElementById("imagen").value = "";
            document.getElementById("nombre").focus();
        }

        function guardar() {
            localStorage.setItem("productos", JSON.stringify(productos));
            mostrar();
            actualizarEstadisticas();
        }

        function actualizarEstadisticas() {
            document.getElementById("totalProductos").textContent = productos.length;
            
            if (productos.length > 0) {
                const promedio = productos.reduce((sum, p) => sum + p.precio, 0) / productos.length;
                document.getElementById("precioPromedio").textContent = "$" + promedio.toFixed(2);
            } else {
                document.getElementById("precioPromedio").textContent = "$0.00";
            }
        }

        function mostrar() {
            const container = document.getElementById("productos");
            
            if (productos.length === 0) {
                container.innerHTML = '<div class="vacio">No hay productos registrados. ¡Agrega el primero!</div>';
                return;
            }

            container.innerHTML = productos.map(p => `
                <div class="producto">
                    <img src="${p.imagen}" alt="${p.nombre}" onerror="this.src='https://via.placeholder.com/200?text=Imagen+no+disponible'">
                    <div class="producto-info">
                        <h3>${p.nombre}</h3>
                        <div class="producto-precio">$${p.precio.toFixed(2)}</div>
                        <div class="producto-desc">${p.descripcion || 'Sin descripción'}</div>
                        <div class="producto-actions">
                            <button class="btn-editar" onclick="editarProducto(${p.id})">✏️ Editar</button>
                            <button class="btn-borrar" onclick="borrarProducto(${p.id})">🗑️ Borrar</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function irATienda() {
            window.open('index.html', '_blank');
        }

        mostrar();
        actualizarEstadisticas();
    </script>
</body>
</html>
